services:
  # Web应用
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: sakura-ai-reviewer
    container_name: sakura-ai-reviewer
    restart: unless-stopped
    network_mode: host  # 使用宿主机网络,可直接访问 localhost
    volumes:
      - ../logs:/app/logs
      - ../config:/app/config  # 存放 connection.json 和策略/标签配置
      - ../backend:/app/backend  # 开发模式：挂载 backend 代码目录
      - chroma_data:/app/data/chroma  # ChromaDB 向量数据库持久化
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker (可选，用于处理异步任务)
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: sakura-ai-reviewer
    container_name: pr-reviewer-worker
    restart: unless-stopped
    network_mode: host  # 使用宿主机网络,可直接访问 localhost
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ../logs:/app/logs
      - ../config:/app/config
      - chroma_data:/app/data/chroma  # ChromaDB 向量数据库持久化
    profiles:
      - with-worker

# ChromaDB 向量数据库持久化卷
volumes:
  chroma_data:
    driver: local
