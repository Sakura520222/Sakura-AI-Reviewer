# PR审查策略配置

strategies:
  # 小改动策略
  quick:
    name: "⚡️ 快速审查"
    conditions:
      max_files: 5
      max_lines: 200
    prompt: |
      作为代码审查助手，请快速审查以下代码变更，重点关注：
      1. 语法错误和明显的bug
      2. 安全问题（如注入漏洞、敏感信息泄露）
      3. 重大逻辑错误
      
      简洁回复，只指出关键问题，格式：
      - 🔴 严重问题（必须修复）
      - 🟡 建议（可选）
    
  # 标准审查策略
  standard:
    name: "🔍 标准审查"
    conditions:
      max_files: 20
      max_lines: 1000
    prompt: |
      作为代码审查专家，请全面审查以下代码变更：
      
      请检查以下方面：
      1. **代码质量**：可读性、可维护性、命名规范
      2. **潜在bug**：边界情况、空值处理、并发问题
      3. **性能问题**：算法复杂度、资源使用
      4. **安全漏洞**：输入验证、权限检查、数据加密
      5. **最佳实践**：设计模式、代码复用、错误处理
      
      请以结构化格式回复：
      
      ## 🔴 严重问题（必须修复）
      - [问题描述]
      
      ## 🟡 改进建议（推荐）
      - [问题描述]
      
      ## ✅ 做得好的地方
      - [正面反馈]

  # 深度审查策略
  deep:
    name: "🔬 深度审查"
    conditions:
      max_files: 100
      max_lines: 10000
    prompt: |
      作为资深架构师，请深度审查这个大型PR：
      
      请从以下维度进行审查：
      1. **架构设计**：整体架构合理性、模块划分、依赖关系
      2. **设计模式**：设计模式应用是否恰当
      3. **代码规范**：团队规范一致性、代码风格
      4. **技术债务**：潜在的技术债务、代码坏味道
      5. **可测试性**：单元测试覆盖、可测试性设计
      6. **可维护性**：代码复杂度、文档完整性
      7. **扩展性**：未来扩展的便利性
      
      请提供：
      
      ## 📊 整体评价
      - 代码质量评分：[1-10分]
      - 简短评价：[一句话总结]
      
      ## 🔴 关键问题（优先处理）
      1. [问题描述]
         - 文件：[文件名:行号]
         - 影响：[影响说明]
         - 建议：[修复建议]
      
      ## 🟡 重要改进
      [同上格式]
      
      ## 📝 总结性建议
      [整体改进方向]

  # 超大PR策略
  large:
    name: "📋 汇总报告"
    conditions:
      max_files: 999999
      max_lines: 99999999
    prompt: |
      这个PR非常大，无法逐文件详细审查。请提供一份汇总报告：
      
      1. **变更概览**：主要涉及的模块和功能
      2. **风险评估**：高风险区域识别
      3. **建议**：是否建议拆分成多个小PR
      
      简洁回复，重点突出关键信息。

# 文件过滤规则
file_filters:
  # 跳过的文件类型
  skip_extensions:
    - .lock
    - .gitignore
    - .dockerignore
    - LICENSE
  
  # 跳过的文件路径
  skip_paths:
    - node_modules/
    - vendor/
    - .git/
    - dist/
    - build/
    - __pycache__/
    - .venv/
    - venv/
  
  # 代码文件扩展名（用于识别）
  code_extensions:
    - .py
    - .js
    - .ts
    - .tsx
    - .jsx
    - .go
    - .java
    - .cpp
    - .c
    - .h
    - .cs
    - .php
    - .rb
    - .rs
    - .swift
    - .kt
    - .scala
    - .sh
    - .sql
    - .css
    - .scss
    - .html
    - .vue
    - .svelte

# 批处理配置
batch:
  max_files_per_batch: 10  # 每批处理的最大文件数
  max_lines_per_batch: 2000  # 每批处理的最大行数

# 上下文增强配置
context_enhancement:
  # 是否启用项目结构展示
  enable_project_structure: true
  
  # 项目结构最大文件数
  max_structure_files: 500
  
  # 是否启用AI函数工具（让AI自主查看文件）
  enable_ai_tools: true
  
  # AI工具的最大调用次数（防止无限循环）
  max_tool_iterations: 10
  
  # 单个文件最大读取大小（字节）
  max_file_size: 100000  # 100KB
