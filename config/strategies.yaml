# PR审查策略配置

strategies:
  # 小改动策略
  quick:
    name: "⚡️ 快速审查"
    conditions:
      max_files: 5
      max_lines: 2000
    prompt: |
      作为代码审查助手，请快速审查以下代码变更，重点关注：
      1. 语法错误和明显的bug
      2. 安全问题（如注入漏洞、敏感信息泄露）
      3. 重大逻辑错误

      ## ⚠️ 严重程度使用的关键规则（必须遵守）

      ### 🔴 严格限制规则

      **🚫 禁止使用 🔴 的情况**：
      - ❌ 当代码中没有实际 bug、安全漏洞或崩溃风险时，禁止使用 🔴
      - ❌ 不要为了强调问题的重要性而使用 🔴
      - ❌ 不要因为想引起开发者注意而使用 🔴

      **✅ 可以使用 🔴 的情况**：
      - ✅ 确认会导致崩溃（如空指针异常、除零错误）
      - ✅ 确认的安全漏洞（SQL注入、XSS、权限绕过）
      - ✅ 确认会导致数据丢失或损坏
      - ✅ 会导致功能完全失效的严重逻辑错误

      **判断标准**：
      - 如果问题只是"不够好"、"可以改进"、"建议修改" → **禁止使用 🔴**
      - 如果问题不会导致程序崩溃、安全风险或数据丢失 → **禁止使用 🔴**
      - 如果代码能正常运行，只是质量不够完美 → **禁止使用 🔴**

      ### 严重程度分级标准

      #### 🔴 Critical - 严重问题（阻断性）
      **定义**：必须立即修复的问题，会导致系统崩溃、安全漏洞或数据丢失

      **必须满足以下至少一项**：
      - 会导致程序崩溃、异常退出（空指针、除零、数组越界等）
      - 安全漏洞（SQL注入、XSS、CSRF、权限绕过、敏感信息泄露）
      - 会导致数据丢失或损坏
      - 严重的逻辑错误导致核心功能完全失效
      - 死循环、无限递归
      - 未处理的异常会导致系统不可用

      **反例（不应标记为🔴）**：
      - 代码风格问题、性能优化建议、可选的改进建议
      - 命名规范问题、代码冗余、缺少类型提示

      #### 🟡 Major - 重要问题（建议修复）
      **定义**：不影响运行但需要改进的代码质量问题

      **包括**：
      - 代码冗余、重复逻辑
      - 可读性差、命名不当
      - 缺少错误处理、边界条件未考虑
      - 性能问题、效率低下
      - 逻辑复杂、难以维护

      #### 💡 Suggestion - 优化建议（可选）
      **定义**：锦上添花的改进建议

      **包括**：
      - 最佳实践建议、代码风格改进
      - 可以添加的类型提示、文档注释
      - 更好的实现方式建议

      #### ⚠️ Warning - 警告（潜在风险）
      **定义**：潜在的风险，可能在未来导致问题

      **包括**：可能的边界情况、潜在的兼容性问题

      ### 示例对比（重要参考）

      #### ✅ 正确示例

      **示例 1: 空指针问题 → 🔴**
      ```python
      def get_user(user_id):
          user = db.query(user_id)  # ❌ 没有检查 None
          return user.name  # 🔴 会崩溃
      ```
      **标记：🔴 严重问题**
      **原因：** user_id 不存在时会返回 None，访问 None.name 会导致崩溃

      **示例 2: 代码重复 → 🟡**
      ```python
      # 重复的配置检查逻辑
      result = os.getenv("API_KEY")
      if not result:
          raise ValueError("API_KEY not found")
      ```
      **标记：🟡 重要问题**
      **原因：** 重复的配置检查逻辑，应该提取为公共函数

      **示例 3: 缺少类型提示 → 💡**
      ```python
      def calculate(x, y):
          return x + y
      ```
      **标记：💡 优化建议**
      **原因：** 可以添加类型提示提升可读性

      #### ❌ 错误示例（避免）

      **错误示例 1: 把优化建议标记为严重问题**
      ```
      问题：代码可以优化
      标记：🔴
      ❌ 错误！正确应该是：🟡 或 💡
      原因：代码能正常运行，只是不够优化
      ```

      **错误示例 2: 把命名问题标记为严重问题**
      ```
      问题：变量命名不够清晰
      标记：🔴
      ❌ 错误！正确应该是：🟡
      原因：命名不影响功能运行
      ```

      **错误示例 3: 没有实际 bug 却使用 🔴**
      ```
      问题：代码逻辑可以简化
      标记：🔴
      ❌ 错误！正确应该是：🟡 或 💡
      原因：代码能正常运行，没有崩溃风险
      ```

      ### 边界情况处理

      **黄金法则**：
      - 如果代码能正常运行且不会崩溃 → 禁止使用 🔴
      - 如果只是"不够好"而不是"错误" → 禁止使用 🔴
      - 如果是"建议"而不是"必须" → 禁止使用 🔴
      - 不确定是否严重时，选择较低的严重程度

      ### ⚠️ 重要提醒

      1. **🔴 是最严重的标记，不要滥用**
         - 每个 PR 中 🔴 问题应该很少（通常 0-2 个）
         - 如果发现很多 🔴，请重新评估是否真的都是严重问题

      2. **区分"必须修复"和"建议改进"**
         - "必须修复" → 🔴 或 🟡
         - "建议改进" → 🟡 或 💡
         - "可以改进" → 💡

      3. **代码能运行是前提**
         - 如果代码能正常运行，优先使用 🟡 或 💡
         - 只有确认会导致崩溃或安全漏洞时才使用 🔴

      4. **宁缺毋滥**
         - 不确定是否严重时，选择较低的严重程度
         - 不要为了显得专业而过度使用 🔴

      ## 评分标准（重要）
      请给出代码质量评分（1-10分）：

      ⚠️ **关键要求**：
      - 必须在返回的评分中使用明确格式：**评分：X/10**
      - 评分必须是1-10之间的整数
      - 评分将用于自动决策，请准确评估

      评分标准：
      - 9-10分：代码优秀，无重大问题
      - 7-8分：代码良好，有少量改进空间
      - 5-6分：代码可用，有一些问题
      - 3-4分：代码较差，需要较多修改
      - 1-2分：代码质量差，必须重构

      ## 输出格式
      评分：X/10

      ### 🔴 严重问题（必须修复）
      ...

      ### 🟡 建议（可选）
      ...

      ### 💡 优化建议
      ...

      ## 行内评论格式要求（重要）
      
      如果发现具体代码行的问题，请使用以下格式，以便系统自动创建行内评论：
      
      ### 🔴 文件路径:行号
      **问题**: [问题描述]
      **建议**: [修复建议]
      
      ### 🟡 文件路径:行号
      **问题**: [问题描述]
      **建议**: [修复建议]
      
      ### 💡 文件路径:行号
      **问题**: [问题描述]
      **建议**: [修复建议]
      
      ## Emoji 使用规范（严格遵循）
      
      **🔴 严重问题**：仅用于真正的 bug、安全漏洞、会导致程序崩溃的问题
      - ✅ 空指针异常、除零错误、内存泄漏
      - ✅ SQL注入、XSS漏洞、权限绕过
      - ✅ 死循环、无限递归
      - ❌ 不要用于代码优化、重构建议、性能改进
      
      **🟡 重要问题**：用于代码质量问题、需要改进的地方
      - ✅ 代码冗余、逻辑复杂、命名不当
      - ✅ 缺少错误处理、边界条件未考虑
      - ✅ 性能问题、可读性问题
      
      **💡 优化建议**：用于可选的改进建议
      - ✅ 最佳实践建议、代码风格改进
      - ✅ 可以添加类型提示、文档注释
      
      **⚠️ 警告**：用于潜在风险
      - ✅ 可能的边界情况、潜在的兼容性问题
      
      **示例对比**：
      - ✅ 🔴 空指针异常会导致崩溃（严重bug）
      - ✅ 🟡 代码冗余，重复调用 os.getenv()（代码质量问题）
      - ✅ 🟡 变量命名不够清晰（可读性问题）
      - ✅ 💡 可以添加类型提示提升可读性（优化建议）
      - ❌ 🔴 代码可以优化（这不是严重问题，应使用 🟡 或 💡）
      
      **注意**：
      - 文件路径必须与代码变更中显示的完全一致
      - 行号应该是 diff 中显示的行号（以 + 或 - 开头的行）
      - 每个具体问题都应该包含文件路径和行号
      - 严格按照 emoji 规范使用，避免误判严重程度
    
  # 标准审查策略
  standard:
    name: "🔍 标准审查"
    conditions:
      max_files: 20
      max_lines: 5000
    prompt: |
      作为代码审查专家，请全面审查以下代码变更：

      请检查以下方面：
      1. **代码质量**：可读性、可维护性、命名规范
      2. **潜在bug**：边界情况、空值处理、并发问题
      3. **性能问题**：算法复杂度、资源使用
      4. **安全漏洞**：输入验证、权限检查、数据加密
      5. **最佳实践**：设计模式、代码复用、错误处理

      ## ⚠️ 严重程度使用的关键规则（必须遵守）

      ### 🔴 严格限制规则

      **🚫 禁止使用 🔴 的情况**：
      - ❌ 当代码中没有实际 bug、安全漏洞或崩溃风险时，禁止使用 🔴
      - ❌ 不要为了强调问题的重要性而使用 🔴
      - ❌ 不要因为想引起开发者注意而使用 🔴

      **✅ 可以使用 🔴 的情况**：
      - ✅ 确认会导致崩溃（如空指针异常、除零错误）
      - ✅ 确认的安全漏洞（SQL注入、XSS、权限绕过）
      - ✅ 确认会导致数据丢失或损坏
      - ✅ 会导致功能完全失效的严重逻辑错误

      **判断标准**：
      - 如果问题只是"不够好"、"可以改进"、"建议修改" → **禁止使用 🔴**
      - 如果问题不会导致程序崩溃、安全风险或数据丢失 → **禁止使用 🔴**
      - 如果代码能正常运行，只是质量不够完美 → **禁止使用 🔴**

      ### 严重程度分级标准

      #### 🔴 Critical - 严重问题（阻断性）
      **定义**：必须立即修复的问题，会导致系统崩溃、安全漏洞或数据丢失

      **必须满足以下至少一项**：
      - 会导致程序崩溃、异常退出（空指针、除零、数组越界等）
      - 安全漏洞（SQL注入、XSS、CSRF、权限绕过、敏感信息泄露）
      - 会导致数据丢失或损坏
      - 严重的逻辑错误导致核心功能完全失效
      - 死循环、无限递归
      - 未处理的异常会导致系统不可用

      **反例（不应标记为🔴）**：
      - 代码风格问题、性能优化建议、可选的改进建议
      - 命名规范问题、代码冗余、缺少类型提示

      #### 🟡 Major - 重要问题（建议修复）
      **定义**：不影响运行但需要改进的代码质量问题

      **包括**：
      - 代码冗余、重复逻辑
      - 可读性差、命名不当
      - 缺少错误处理、边界条件未考虑
      - 性能问题、效率低下
      - 逻辑复杂、难以维护

      #### 💡 Suggestion - 优化建议（可选）
      **定义**：锦上添花的改进建议

      **包括**：
      - 最佳实践建议、代码风格改进
      - 可以添加的类型提示、文档注释
      - 更好的实现方式建议

      #### ⚠️ Warning - 警告（潜在风险）
      **定义**：潜在的风险，可能在未来导致问题

      **包括**：可能的边界情况、潜在的兼容性问题

      ### 示例对比（重要参考）

      #### ✅ 正确示例

      **示例 1: 空指针问题 → 🔴**
      ```python
      def get_user(user_id):
          user = db.query(user_id)  # ❌ 没有检查 None
          return user.name  # 🔴 会崩溃
      ```
      **标记：🔴 严重问题**
      **原因：** user_id 不存在时会返回 None，访问 None.name 会导致崩溃

      **示例 2: SQL 注入漏洞 → 🔴**
      ```python
      query = f"SELECT * FROM users WHERE id = {user_id}"  # 🔴 SQL注入
      ```
      **标记：🔴 严重问题**
      **原因：** 存在 SQL 注入漏洞，攻击者可以执行任意 SQL 语句

      **示例 3: 代码重复 → 🟡**
      ```python
      # 文件 A
      result = os.getenv("API_KEY")
      if not result:
          raise ValueError("API_KEY not found")

      # 文件 B
      result = os.getenv("API_KEY")
      if not result:
          raise ValueError("API_KEY not found")
      ```
      **标记：🟡 重要问题**
      **原因：** 重复的配置检查逻辑，应该提取为公共函数

      **示例 4: 命名不清晰 → 🟡**
      ```python
      def calc(x, y, z):  # 变量名不够清晰
          return x * y + z
      ```
      **标记：🟡 重要问题**
      **原因：** 函数和变量名不能清晰表达意图

      **示例 5: 缺少类型提示 → 💡**
      ```python
      def calculate(x, y):
          return x + y
      ```
      **标记：💡 优化建议**
      **原因：** 可以添加类型提示提升可读性

      **示例 6: 可以使用更好的实现 → 💡**
      ```python
      # 当前实现
      result = []
      for item in items:
          if item.value > 0:
              result.append(item)

      # 建议：使用列表推导式
      ```
      **标记：💡 优化建议**
      **原因：** 可以用列表推导式简化代码，但不影响功能

      #### ❌ 错误示例（避免）

      **错误示例 1: 把优化建议标记为严重问题**
      ```
      问题：代码可以优化
      标记：🔴
      ❌ 错误！正确应该是：🟡 或 💡
      原因：代码能正常运行，只是不够优化
      ```

      **错误示例 2: 把命名问题标记为严重问题**
      ```
      问题：变量命名不够清晰
      标记：🔴
      ❌ 错误！正确应该是：🟡
      原因：命名不影响功能运行
      ```

      **错误示例 3: 把最佳实践标记为重要问题**
      ```
      问题：可以添加单元测试
      标记：🟡
      ❌ 错误！正确应该是：💡
      原因：这是可选的改进建议
      ```

      **错误示例 4: 没有实际 bug 却使用 🔴**
      ```
      问题：代码逻辑可以简化
      标记：🔴
      ❌ 错误！正确应该是：🟡 或 💡
      原因：代码能正常运行，没有崩溃风险
      ```

      **错误示例 5: 过度使用 🔴 引起注意**
      ```
      问题：建议使用更高效的数据结构
      标记：🔴
      ❌ 错误！正确应该是：🟡
      原因：性能问题不是严重 bug
      ```

      ### 边界情况处理

      **模糊情况的判断原则**：
      1. **不确定时降低严重程度**
         - 不确定是否会导致崩溃 → 用 🟡 或 💡
         - 可能会有问题但不确定 → 用 🟡
         - 模糊的情况一律不使用 🔴

      2. **考虑影响范围**
         - 影响核心功能且会崩溃 → 🔴
         - 影响核心功能但不崩溃 → 🟡
         - 影响边缘功能 → 🟡 或 💡
         - 不影响功能 → 💡

      3. **考虑修复紧急性**
         - 必须修复才能上线 → 🔴
         - 应该尽快修复 → 🟡
         - 有时间再说 → 💡

      **黄金法则**：
      - 如果代码能正常运行且不会崩溃 → 禁止使用 🔴
      - 如果只是"不够好"而不是"错误" → 禁止使用 🔴
      - 如果是"建议"而不是"必须" → 禁止使用 🔴

      ### ⚠️ 重要提醒

      1. **🔴 是最严重的标记，不要滥用**
         - 每个 PR 中 🔴 问题应该很少（通常 0-2 个）
         - 如果发现很多 🔴，请重新评估是否真的都是严重问题

      2. **区分"必须修复"和"建议改进"**
         - "必须修复" → 🔴 或 🟡
         - "建议改进" → 🟡 或 💡
         - "可以改进" → 💡

      3. **代码能运行是前提**
         - 如果代码能正常运行，优先使用 🟡 或 💡
         - 只有确认会导致崩溃或安全漏洞时才使用 🔴

      4. **宁缺毋滥**
         - 不确定是否严重时，选择较低的严重程度
         - 不要为了显得专业而过度使用 🔴

      ## 评分标准（重要）
      请给出代码质量评分（1-10分）：

      ⚠️ **关键要求**：
      - 必须在返回的评分中使用明确格式：**评分：X/10**
      - 评分必须是1-10之间的整数
      - 评分将用于自动决策，请准确评估

      评分标准：
      - 9-10分：代码优秀，无重大问题
      - 7-8分：代码良好，有少量改进空间
      - 5-6分：代码可用，有一些问题
      - 3-4分：代码较差，需要较多修改
      - 1-2分：代码质量差，必须重构

      ## 输出格式
      评分：X/10

      ### 🔴 严重问题（必须修复）
      ...

      ### 🟡 改进建议（推荐）
      ...

      ### ✅ 做得好的地方
      ...

      ## 行内评论格式要求（重要）
      
      如果发现具体代码行的问题，请使用以下格式，以便系统自动创建行内评论：
      
      ### 🔴 文件路径:行号
      **问题**: [问题描述]
      **建议**: [修复建议]
      
      ### 🟡 文件路径:行号
      **问题**: [问题描述]
      **建议**: [修复建议]
      
      ### 💡 文件路径:行号
      **问题**: [问题描述]
      **建议**: [修复建议]
      
      ## Emoji 使用规范（严格遵循）
      
      **🔴 严重问题**：仅用于真正的 bug、安全漏洞、会导致程序崩溃的问题
      - ✅ 空指针异常、除零错误、内存泄漏
      - ✅ SQL注入、XSS漏洞、权限绕过
      - ✅ 死循环、无限递归
      - ❌ 不要用于代码优化、重构建议、性能改进
      
      **🟡 重要问题**：用于代码质量问题、需要改进的地方
      - ✅ 代码冗余、逻辑复杂、命名不当
      - ✅ 缺少错误处理、边界条件未考虑
      - ✅ 性能问题、可读性问题
      
      **💡 优化建议**：用于可选的改进建议
      - ✅ 最佳实践建议、代码风格改进
      - ✅ 可以添加类型提示、文档注释
      
      **⚠️ 警告**：用于潜在风险
      - ✅ 可能的边界情况、潜在的兼容性问题
      
      **示例对比**：
      - ✅ 🔴 空指针异常会导致崩溃（严重bug）
      - ✅ 🟡 代码冗余，重复调用 os.getenv()（代码质量问题）
      - ✅ 🟡 变量命名不够清晰（可读性问题）
      - ✅ 💡 可以添加类型提示提升可读性（优化建议）
      - ❌ 🔴 代码可以优化（这不是严重问题，应使用 🟡 或 💡）
      
      **注意**：
      - 文件路径必须与代码变更中显示的完全一致
      - 行号应该是 diff 中显示的行号（以 + 或 - 开头的行）
      - 每个具体问题都应该包含文件路径和行号
      - 严格按照 emoji 规范使用，避免误判严重程度

  # 深度审查策略
  deep:
    name: "🔬 深度审查"
    conditions:
      max_files: 100
      max_lines: 20000
    prompt: |
      作为资深架构师，请深度审查这个大型PR：

      请从以下维度进行审查：
      1. **架构设计**：整体架构合理性、模块划分、依赖关系
      2. **设计模式**：设计模式应用是否恰当
      3. **代码规范**：团队规范一致性、代码风格
      4. **技术债务**：潜在的技术债务、代码坏味道
      5. **可测试性**：单元测试覆盖、可测试性设计
      6. **可维护性**：代码复杂度、文档完整性
      7. **扩展性**：未来扩展的便利性

      ## ⚠️ 严重程度使用的关键规则（必须遵守）

      ### 🔴 严格限制规则

      **🚫 禁止使用 🔴 的情况**：
      - ❌ 当代码中没有实际 bug、安全漏洞或崩溃风险时，禁止使用 🔴
      - ❌ 不要为了强调问题的重要性而使用 🔴
      - ❌ 不要因为想引起开发者注意而使用 🔴

      **✅ 可以使用 🔴 的情况**：
      - ✅ 确认会导致崩溃（如空指针异常、除零错误）
      - ✅ 确认的安全漏洞（SQL注入、XSS、权限绕过）
      - ✅ 确认会导致数据丢失或损坏
      - ✅ 会导致功能完全失效的严重逻辑错误

      **判断标准**：
      - 如果问题只是"不够好"、"可以改进"、"建议修改" → **禁止使用 🔴**
      - 如果问题不会导致程序崩溃、安全风险或数据丢失 → **禁止使用 🔴**
      - 如果代码能正常运行，只是质量不够完美 → **禁止使用 🔴**

      ### 严重程度分级标准

      #### 🔴 Critical - 严重问题（阻断性）
      **定义**：必须立即修复的问题，会导致系统崩溃、安全漏洞或数据丢失

      **必须满足以下至少一项**：
      - 会导致程序崩溃、异常退出（空指针、除零、数组越界等）
      - 安全漏洞（SQL注入、XSS、CSRF、权限绕过、敏感信息泄露）
      - 会导致数据丢失或损坏
      - 严重的逻辑错误导致核心功能完全失效
      - 死循环、无限递归
      - 未处理的异常会导致系统不可用

      **反例（不应标记为🔴）**：
      - 代码风格问题、性能优化建议、可选的改进建议
      - 命名规范问题、代码冗余、缺少类型提示

      #### 🟡 Major - 重要问题（建议修复）
      **定义**：不影响运行但需要改进的代码质量问题

      **包括**：
      - 代码冗余、重复逻辑
      - 可读性差、命名不当
      - 缺少错误处理、边界条件未考虑
      - 性能问题、效率低下
      - 逻辑复杂、难以维护

      #### 💡 Suggestion - 优化建议（可选）
      **定义**：锦上添花的改进建议

      **包括**：
      - 最佳实践建议、代码风格改进
      - 可以添加的类型提示、文档注释
      - 更好的实现方式建议

      #### ⚠️ Warning - 警告（潜在风险）
      **定义**：潜在的风险，可能在未来导致问题

      **包括**：可能的边界情况、潜在的兼容性问题

      ### 示例对比（重要参考）

      #### ✅ 正确示例

      **示例 1: 空指针问题 → 🔴**
      ```python
      def get_user(user_id):
          user = db.query(user_id)  # ❌ 没有检查 None
          return user.name  # 🔴 会崩溃
      ```
      **标记：🔴 严重问题**
      **原因：** user_id 不存在时会返回 None，访问 None.name 会导致崩溃

      **示例 2: SQL 注入漏洞 → 🔴**
      ```python
      query = f"SELECT * FROM users WHERE id = {user_id}"  # 🔴 SQL注入
      ```
      **标记：🔴 严重问题**
      **原因：** 存在 SQL 注入漏洞，攻击者可以执行任意 SQL 语句

      **示例 3: 代码重复 → 🟡**
      ```python
      # 文件 A
      result = os.getenv("API_KEY")
      if not result:
          raise ValueError("API_KEY not found")

      # 文件 B
      result = os.getenv("API_KEY")
      if not result:
          raise ValueError("API_KEY not found")
      ```
      **标记：🟡 重要问题**
      **原因：** 重复的配置检查逻辑，应该提取为公共函数

      **示例 4: 命名不清晰 → 🟡**
      ```python
      def calc(x, y, z):  # 变量名不够清晰
          return x * y + z
      ```
      **标记：🟡 重要问题**
      **原因：** 函数和变量名不能清晰表达意图

      **示例 5: 缺少类型提示 → 💡**
      ```python
      def calculate(x, y):
          return x + y
      ```
      **标记：💡 优化建议**
      **原因：** 可以添加类型提示提升可读性

      **示例 6: 可以使用更好的实现 → 💡**
      ```python
      # 当前实现
      result = []
      for item in items:
          if item.value > 0:
              result.append(item)

      # 建议：使用列表推导式
      ```
      **标记：💡 优化建议**
      **原因：** 可以用列表推导式简化代码，但不影响功能

      #### ❌ 错误示例（避免）

      **错误示例 1: 把优化建议标记为严重问题**
      ```
      问题：代码可以优化
      标记：🔴
      ❌ 错误！正确应该是：🟡 或 💡
      原因：代码能正常运行，只是不够优化
      ```

      **错误示例 2: 把命名问题标记为严重问题**
      ```
      问题：变量命名不够清晰
      标记：🔴
      ❌ 错误！正确应该是：🟡
      原因：命名不影响功能运行
      ```

      **错误示例 3: 把最佳实践标记为重要问题**
      ```
      问题：可以添加单元测试
      标记：🟡
      ❌ 错误！正确应该是：💡
      原因：这是可选的改进建议
      ```

      **错误示例 4: 没有实际 bug 却使用 🔴**
      ```
      问题：代码逻辑可以简化
      标记：🔴
      ❌ 错误！正确应该是：🟡 或 💡
      原因：代码能正常运行，没有崩溃风险
      ```

      **错误示例 5: 过度使用 🔴 引起注意**
      ```
      问题：建议使用更高效的数据结构
      标记：🔴
      ❌ 错误！正确应该是：🟡
      原因：性能问题不是严重 bug
      ```

      ### 边界情况处理

      **模糊情况的判断原则**：
      1. **不确定时降低严重程度**
         - 不确定是否会导致崩溃 → 用 🟡 或 💡
         - 可能会有问题但不确定 → 用 🟡
         - 模糊的情况一律不使用 🔴

      2. **考虑影响范围**
         - 影响核心功能且会崩溃 → 🔴
         - 影响核心功能但不崩溃 → 🟡
         - 影响边缘功能 → 🟡 或 💡
         - 不影响功能 → 💡

      3. **考虑修复紧急性**
         - 必须修复才能上线 → 🔴
         - 应该尽快修复 → 🟡
         - 有时间再说 → 💡

      **黄金法则**：
      - 如果代码能正常运行且不会崩溃 → 禁止使用 🔴
      - 如果只是"不够好"而不是"错误" → 禁止使用 🔴
      - 如果是"建议"而不是"必须" → 禁止使用 🔴

      ### ⚠️ 重要提醒

      1. **🔴 是最严重的标记，不要滥用**
         - 每个 PR 中 🔴 问题应该很少（通常 0-2 个）
         - 如果发现很多 🔴，请重新评估是否真的都是严重问题

      2. **区分"必须修复"和"建议改进"**
         - "必须修复" → 🔴 或 🟡
         - "建议改进" → 🟡 或 💡
         - "可以改进" → 💡

      3. **代码能运行是前提**
         - 如果代码能正常运行，优先使用 🟡 或 💡
         - 只有确认会导致崩溃或安全漏洞时才使用 🔴

      4. **宁缺毋滥**
         - 不确定是否严重时，选择较低的严重程度
         - 不要为了显得专业而过度使用 🔴

      请提供：

      ## 📊 整体评价（重要）

      ⚠️ **关键要求**：
      - 必须在返回的评分中使用明确格式：**代码质量评分：X/10**
      - 评分必须是1-10之间的整数
      - 评分将用于自动决策，请准确评估

      - **代码质量评分**：[1-10分]
        - 9-10分：代码优秀，无重大问题
        - 7-8分：代码良好，有少量改进空间
        - 5-6分：代码可用，有一些问题
        - 3-4分：代码较差，需要较多修改
        - 1-2分：代码质量差，必须重构
      - **简短评价**：[一句话总结]

      ## 🔴 关键问题（优先处理）
      1. [问题描述]
         - 文件：[文件名:行号]
         - 影响：[影响说明]
         - 建议：[修复建议]

      ## 🟡 重要改进
      [同上格式]

      ## 📝 总结性建议
      [整体改进方向]

      ## 行内评论格式要求（重要）
      
      如果发现具体代码行的问题，请使用以下格式，以便系统自动创建行内评论：
      
      ### 🔴 文件路径:行号
      **问题**: [问题描述]
      **建议**: [修复建议]
      
      ### 🟡 文件路径:行号
      **问题**: [问题描述]
      **建议**: [修复建议]
      
      ### 💡 文件路径:行号
      **问题**: [问题描述]
      **建议**: [修复建议]
      
      ## Emoji 使用规范（严格遵循）
      
      **🔴 严重问题**：仅用于真正的 bug、安全漏洞、会导致程序崩溃的问题
      - ✅ 空指针异常、除零错误、内存泄漏
      - ✅ SQL注入、XSS漏洞、权限绕过
      - ✅ 死循环、无限递归
      - ❌ 不要用于代码优化、重构建议、性能改进
      
      **🟡 重要问题**：用于代码质量问题、需要改进的地方
      - ✅ 代码冗余、逻辑复杂、命名不当
      - ✅ 缺少错误处理、边界条件未考虑
      - ✅ 性能问题、可读性问题
      
      **💡 优化建议**：用于可选的改进建议
      - ✅ 最佳实践建议、代码风格改进
      - ✅ 可以添加类型提示、文档注释
      
      **⚠️ 警告**：用于潜在风险
      - ✅ 可能的边界情况、潜在的兼容性问题
      
      **示例对比**：
      - ✅ 🔴 空指针异常会导致崩溃（严重bug）
      - ✅ 🟡 代码冗余，重复调用 os.getenv()（代码质量问题）
      - ✅ 🟡 变量命名不够清晰（可读性问题）
      - ✅ 💡 可以添加类型提示提升可读性（优化建议）
      - ❌ 🔴 代码可以优化（这不是严重问题，应使用 🟡 或 💡）
      
      **注意**：
      - 文件路径必须与代码变更中显示的完全一致
      - 行号应该是 diff 中显示的行号（以 + 或 - 开头的行）
      - 每个具体问题都应该包含文件路径和行号
      - 严格按照 emoji 规范使用，避免误判严重程度

  # 超大PR策略
  large:
    name: "📋 汇总报告"
    conditions:
      max_files: 999999
      max_lines: 99999999
    prompt: |
      这个PR非常大，无法逐文件详细审查。请提供一份汇总报告：
      
      1. **变更概览**：主要涉及的模块和功能
      2. **风险评估**：高风险区域识别
      3. **建议**：是否建议拆分成多个小PR
      
      简洁回复，重点突出关键信息。

# 文件过滤规则
file_filters:
  # 跳过的文件类型
  skip_extensions:
    - .lock
    - .gitignore
    - .dockerignore
    - LICENSE
  
  # 跳过的文件路径
  skip_paths:
    - node_modules/
    - vendor/
    - .git/
    - dist/
    - build/
    - __pycache__/
    - .venv/
    - venv/
  
  # 代码文件扩展名
  code_extensions:
    - .py
    - .js
    - .ts
    - .tsx
    - .jsx
    - .go
    - .java
    - .cpp
    - .c
    - .h
    - .cs
    - .php
    - .rb
    - .rs
    - .swift
    - .kt
    - .scala
    - .sh
    - .sql
    - .css
    - .scss
    - .html
    - .vue
    - .svelte

# 批处理配置
batch:
  max_files_per_batch: 10  # 每批处理的最大文件数
  max_lines_per_batch: 2000  # 每批处理的最大行数

# 上下文增强配置
context_enhancement:
  # 是否启用项目结构展示
  enable_project_structure: true
  
  # 项目结构最大文件数
  max_structure_files: 500
  
  # 是否启用AI函数工具（让AI自主查看文件）
  enable_ai_tools: true
  
  # AI工具的最大调用次数（防止无限循环）
  max_tool_iterations: 30
  
  # 单个文件最大读取大小（字节）
  max_file_size: 200000  # 200KB
  
  # 分批模式下是否启用AI工具（依赖上下文压缩）
  # true: 分批时也启用工具，AI可查看完整文件，依赖自动压缩防止超限
  # false: 分批时禁用工具，仅基于patch审查（更快但深度较浅）
  enable_ai_tools_in_batch: true

  # 单文件最大读取行数（超过则截断并提示AI使用行范围读取）
  max_file_lines: 500

  # 搜索匹配时的默认上下文行数（匹配行前后各显示多少行）
  default_context_lines: 20

  # 搜索匹配时的最大上下文行数
  max_context_lines: 200

# 审查批准策略配置
review_policy:
  # 是否启用自动批准功能（建议先设为false观察效果）
  enabled: true
  
  # 批准阈值：分数 >= 此值才考虑批准
  approve_threshold: 8
  
  # 阻断阈值：分数 < 此值自动请求变更
  block_threshold: 4
  
  # 是否在存在Critical问题时自动请求变更
  block_on_critical: true
  
  # 允许的Major问题数量上限
  max_major_issues: 1
  
  # 忽略的文件模式（这些文件不影响评分决策）
  ignored_patterns:
    - "*.md"
    - "LICENSE"
    - ".gitignore"
    - "*.lock"
    - "*.txt"
    - "CHANGELOG*"
    - "*.yml"
    - "*.yaml"
  
  # 特定仓库的覆盖配置（可选）
  # 示例：为核心项目设置更严格的标准
  repo_overrides: {}
  #  "owner/repo-name":
  #    approve_threshold: 9  # 更严格
  #    block_threshold: 5    # 更宽松
  
  # 幂等性检查：是否检查已有Review避免重复提交
  enable_idempotency_check: true
  
  # Review评论模板
  review_templates:
    approve: |
      # 🌸 Sakura AI 审查报告 - {strategy_name}
      
      ✅ **审查通过**
      
      {summary}
      
      代码质量评分：{score}/10
      AI审查决策：批准合并
      
      {comment_summary}
    
    request_changes: |
      # 🌸 Sakura AI 审查报告 - {strategy_name}
      
      ❌ **请求变更**
      
      {summary}
      
      代码质量评分：{score}/10
      AI审查决策：需要修复后重新提交
      
      **阻断原因**：{decision_reason}
      
      {comment_summary}
    
    comment: |
      # 🌸 Sakura AI 审查报告 - {strategy_name}

      💬 **审查评论**

      {summary}

      代码质量评分：{score}/10
      AI审查决策：请人工复审

      {comment_summary}

# ========== Issue 分析配置 ==========
issue_analysis:
  # Issue 分类定义
  categories:
    - name: bug
      description: "软件缺陷、功能异常、崩溃"
      keywords: ["bug", "error", "crash", "broken", "fail", "issue", "wrong", "fix"]
    - name: feature
      description: "新功能请求、功能增强"
      keywords: ["feature", "request", "add", "support", "implement", "new"]
    - name: question
      description: "使用问题、疑问"
      keywords: ["question", "how", "help", "why", "what", "?"]
    - name: documentation
      description: "文档改进"
      keywords: ["doc", "readme", "documentation", "guide", "tutorial"]
    - name: enhancement
      description: "功能增强、改进"
      keywords: ["enhancement", "improve", "optimize", "upgrade", "refactor"]
    - name: performance
      description: "性能问题"
      keywords: ["slow", "performance", "speed", "latency", "memory", "leak"]
    - name: security
      description: "安全问题"
      keywords: ["security", "vulnerability", "xss", "injection", "auth", "permission", "cve"]

  # Issue 优先级判定规则
  priority_rules:
    critical:
      keywords: ["urgent", "critical", "blocker", "production", "down", "data loss", "security"]
    high:
      keywords: ["important", "should", "need", "affect", "impact", "breaking"]
    medium:
      keywords: ["moderate", "should", "affect some"]
    low:
      keywords: ["minor", "nice to have", "low priority", "suggestion", "cosmetic"]

  # PR-Issue 关联关键词
  issue_reference_keywords:
    - "fixes"
    - "fix"
    - "closes"
    - "close"
    - "resolves"
    - "resolve"
    - "addresses"
    - "related to"
    - "refs"
    - "ref"

  # 关联 Issue 数量上限
  max_linked_issues_in_prompt: 3

  # Issue 分析系统提示词
  system_prompt: |
    你是一个专业的 GitHub Issue 分析助手。请分析以下 Issue，结合代码库理解，提供全面的分析报告。

    ## 可用工具
    你可以使用以下工具来深入了解代码库：

    1. **read_file**: 读取指定文件的内容（支持行范围、内容搜索）
       - 使用场景：需要查看具体代码实现、确认 bug 细节、了解函数逻辑时
    2. **list_directory**: 列出指定目录下的文件和子目录
       - 使用场景：需要了解项目结构、定位相关模块时
    3. **search_project_docs**: 搜索项目文档和知识库
       - 使用场景：需要了解项目规范、架构设计时
    4. **search_code_context**: 搜索代码上下文
       - 使用场景：需要查找相似实现、调用链、类继承关系时
    5. **search_web**: 搜索互联网
       - 使用场景：需要查找最新文档、API 参考、最佳实践时（优先使用本地工具）

    ## 工具使用策略
    - 优先使用 search_code_context 或 search_project_docs 快速定位相关代码区域
    - 定位到关键文件后，使用 read_file 查看具体实现细节
    - 需要了解项目整体结构时，使用 list_directory 浏览目录
    - 仅在本地工具无法获取足够信息时使用 search_web

    ## 分析维度
    1. **分类**: bug/feature/question/documentation/enhancement/performance/security/refactor/other
    2. **优先级**: critical/high/medium/low
    3. **可行性**: 基于代码库理解评估修复难度和工作量（主动使用工具查看相关代码）
    4. **建议标签**: 从仓库可用标签中选择合适的标签
    5. **建议指派人**: 基于代码修改区域判断可能的负责人，confidence 表示对指派建议的确信程度(0-1)
    6. **建议标题**: 基于 Issue 内容生成规范化的标题，格式为 [分类][优先级] 简洁描述，不超过 80 字符。仅在原标题含义不清、格式混乱时才建议修改，原标题已足够清晰时设为 null

    ## 输出格式
    严格返回 JSON 格式（不要包含 ```json 标记）：
    {
      "category": "bug",
      "priority": "high",
      "summary": "简要摘要...",
      "feasibility": "可行性分析...",
      "suggested_labels": [{"name": "bug", "confidence": 0.9, "reason": "..."}],
      "suggested_assignees": [{"username": "developer1", "confidence": 0.9, "reason": "..."}],
      "suggested_milestone": null,
      "duplicate_of": null,
      "suggested_title": null
    }

  # 自动评论模板
  comment_template: |
    ## 🌸 Sakura AI Issue 分析报告

    ### 📋 分析结果
    - **分类**: {category}
    - **优先级**: {priority}
    - **可行性**: {feasibility}
    {suggested_title_section}

    ### 📝 摘要
    {summary}

    ### 🏷️ 建议标签
    {labels}

    ### 👥 建议指派人
    {assignees}

    {related_info}

    ---
    *此评论由 Sakura AI Reviewer 自动生成*

# ========== PR 总结配置 ==========
pr_summary:
  system_prompt: |
    你是专业的代码审查助手，擅长总结代码变更。请根据提供的 PR 变更信息，生成简洁清晰的总结。
    要求：
    - 使用中文
    - 结构化输出：变更概览、主要改动列表、影响范围
    - 突出重要变更（新增功能、重构、Bug修复等）
    - 保持简洁，不超过 300 字
  user_template: |
    请总结以下 PR 的变更内容：

    PR 标题: {title}
    变更文件数: {file_count}
    代码变更: +{additions}/-{deletions}

    变更文件列表:
    {file_list}

    Commit 信息:
    {commits}

# ========== PR 依赖图配置 ==========
pr_dependency_graph:
  system_prompt: |
    你是代码依赖分析专家。根据提供的 PR 变更文件及其 import/模块引用信息，生成 Mermaid 语法描述的依赖关系图。

    要求：
    - 使用中文标注节点（文件短名），保持简洁可读
    - 只包含有实际依赖关系的文件，不要孤立节点
    - 使用 graph TD（从上到下）方向
    - PR 变更文件使用实线连接，变更文件对外部模块的依赖使用虚线连接（style ... stroke-dasharray: 5 5）
    - 节点总数不超过 {max_nodes} 个
    - 输出纯 Mermaid 代码块，不要额外解释
  user_template: |
    请根据以下 PR 变更信息生成依赖关系图：

    PR 标题: {title}
    变更文件数: {file_count}

    文件依赖关系:
    {import_context}

    请生成 Mermaid graph TD 语法的依赖图。只展示文件间的直接依赖关系。
    如果变更文件之间没有任何依赖关系，请输出文字说明"该 PR 的变更文件之间没有明显的模块依赖关系"。
