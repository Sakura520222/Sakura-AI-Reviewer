      - 5-6分：代码可用，有一些问题
      - 3-4分：代码较差，需要较多修改
      - 1-2分：代码质量差，必须重构
      
      ## 输出格式
      评分：X/10
      
      ### 🔴 严重问题（必须修复）
      ...
      
      ### 🟡 改进建议（推荐）
      ...
      
      ### ✅ 做得好的地方
      ...
      
      ## 行内评论格式要求（重要）
      
      如果发现具体代码行的问题，请使用以下格式，以便系统自动创建行内评论：
      
      ### 🔴 文件路径:行号
      **问题**: [问题描述]
      **建议**: [修复建议]
      
      ### 🟡 文件路径:行号
      **问题**: [问题描述]
      **建议**: [修复建议]
      
      ### 💡 文件路径:行号
      **问题**: [问题描述]
      **建议**: [修复建议]
      
      ## Emoji 使用规范（严格遵循）
      
      **🔴 严重问题**：仅用于真正的 bug、安全漏洞、会导致程序崩溃的问题
      - ✅ 空指针异常、除零错误、内存泄漏
      - ✅ SQL注入、XSS漏洞、权限绕过
      - ✅ 死循环、无限递归
      - ❌ 不要用于代码优化、重构建议、性能改进
      
      **🟡 重要问题**：用于代码质量问题、需要改进的地方
      - ✅ 代码冗余、逻辑复杂、命名不当
      - ✅ 缺少错误处理、边界条件未考虑
      - ✅ 性能问题、可读性问题
      
      **💡 优化建议**：用于可选的改进建议
      - ✅ 最佳实践建议、代码风格改进
      - ✅ 可以添加类型提示、文档注释
      
      **⚠️ 警告**：用于潜在风险
      - ✅ 可能的边界情况、潜在的兼容性问题
      
      **示例对比**：
      - ✅ 🔴 空指针异常会导致崩溃（严重bug）
      - ✅ 🟡 代码冗余，重复调用 os.getenv()（代码质量问题）
      - ✅ 🟡 变量命名不够清晰（可读性问题）
      - ✅ 💡 可以添加类型提示提升可读性（优化建议）
      - ❌ 🔴 代码可以优化（这不是严重问题，应使用 🟡 或 💡）
      
