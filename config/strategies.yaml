  # 超大PR策略
  large:
    name: "📋 汇总报告"
    conditions:
      max_files: 999999
      max_lines: 99999999
    prompt: |
      这个PR非常大，无法逐文件详细审查。请提供一份汇总报告：
      
      1. **变更概览**：主要涉及的模块和功能
      2. **风险评估**：高风险区域识别
      3. **建议**：是否建议拆分成多个小PR
      
      简洁回复，重点突出关键信息。

# 文件过滤规则
file_filters:
  # 跳过的文件类型
  skip_extensions:
    - .lock
    - .gitignore
    - .dockerignore
    - LICENSE
  
  # 跳过的文件路径
  skip_paths:
    - node_modules/
    - vendor/
    - .git/
    - dist/
    - build/
    - __pycache__/
    - .venv/
    - venv/
  
  # 代码文件扩展名
  code_extensions:
    - .py
    - .js
    - .ts
    - .tsx
    - .jsx
    - .go
    - .java
    - .cpp
    - .c
    - .h
    - .cs
    - .php
    - .rb
    - .rs
    - .swift
    - .kt
    - .scala
    - .sh
    - .sql
    - .css
    - .scss
    - .html
    - .vue
    - .svelte

# 批处理配置
batch:
  max_files_per_batch: 10  # 每批处理的最大文件数
  max_lines_per_batch: 2000  # 每批处理的最大行数

# 上下文增强配置
context_enhancement:
  # 是否启用项目结构展示
  enable_project_structure: true
  
  # 项目结构最大文件数
  max_structure_files: 500
  
  # 是否启用AI函数工具（让AI自主查看文件）
  enable_ai_tools: true
  
  # AI工具的最大调用次数（防止无限循环）
  max_tool_iterations: 10
  
  # 单个文件最大读取大小（字节）
  max_file_size: 500000  # 100KB
  
  # 分批模式下是否启用AI工具（依赖上下文压缩）
  # true: 分批时也启用工具，AI可查看完整文件，依赖自动压缩防止超限
  # false: 分批时禁用工具，仅基于patch审查（更快但深度较浅）
  enable_ai_tools_in_batch: true

# 审查批准策略配置
review_policy:
  # 是否启用自动批准功能（建议先设为false观察效果）
  enabled: true
  
  # 批准阈值：分数 >= 此值才考虑批准
  approve_threshold: 8
  
  # 阻断阈值：分数 < 此值自动请求变更
  block_threshold: 4
  
  # 是否在存在Critical问题时自动请求变更
  block_on_critical: true
  
  # 允许的Major问题数量上限
  max_major_issues: 1
  
  # 忽略的文件模式（这些文件不影响评分决策）
  ignored_patterns:
    - "*.md"
    - "LICENSE"
    - ".gitignore"
    - "*.lock"
    - "*.txt"
    - "CHANGELOG*"
    - "*.yml"
    - "*.yaml"
  
  # 特定仓库的覆盖配置（可选）
  # 示例：为核心项目设置更严格的标准
  repo_overrides: {}
  #  "owner/repo-name":
  #    approve_threshold: 9  # 更严格
  #    block_threshold: 5    # 更宽松
  
  # 幂等性检查：是否检查已有Review避免重复提交
  enable_idempotency_check: true
  
  # Review评论模板
  review_templates:
    approve: |
      # 🌸 Sakura AI 审查报告 - {strategy_name}
      
      ✅ **审查通过**
      
      {summary}
      
      代码质量评分：{score}/10
      AI审查决策：批准合并
      
      {comment_summary}
    
    request_changes: |
      # 🌸 Sakura AI 审查报告 - {strategy_name}
      
      ❌ **请求变更**
      
      {summary}
      
      代码质量评分：{score}/10
      AI审查决策：需要修复后重新提交
      
      **阻断原因**：{decision_reason}
      
      {comment_summary}
    
    comment: |
      # 🌸 Sakura AI 审查报告 - {strategy_name}
      
      💬 **审查评论**
      
      {summary}
      
      代码质量评分：{score}/10
      AI审查决策：请人工复审
      
      {comment_summary}
