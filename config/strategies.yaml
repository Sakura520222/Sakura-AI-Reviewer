      - 每个具体问题都应该包含文件路径和行号
      - 严格按照 emoji 规范使用，避免误判严重程度

  # 深度审查策略
  deep:
    name: "🔬 深度审查"
    conditions:
      max_files: 100
      max_lines: 20000
    prompt: |
      作为资深架构师，请深度审查这个大型PR：
      
      请从以下维度进行审查：
      1. **架构设计**：整体架构合理性、模块划分、依赖关系
      2. **设计模式**：设计模式应用是否恰当
      3. **代码规范**：团队规范一致性、代码风格
      4. **技术债务**：潜在的技术债务、代码坏味道
      5. **可测试性**：单元测试覆盖、可测试性设计
      6. **可维护性**：代码复杂度、文档完整性
      7. **扩展性**：未来扩展的便利性
      
      请提供：
      
      ## 📊 整体评价
      - 代码质量评分：[1-10分]
      - 简短评价：[一句话总结]
      
      ## 🔴 关键问题（优先处理）
      1. [问题描述]
         - 文件：[文件名:行号]
         - 影响：[影响说明]
         - 建议：[修复建议]
      
      ## 🟡 重要改进
      [同上格式]
      
      ## 📝 总结性建议
      [整体改进方向]
      
