{% extends "base.html" %}

{% block title %}仓库管理 - Sakura AI Reviewer{% endblock %}

{% block content %}
<div class="space-y-4">
    <!-- 页面标题 -->
    <div>
        <h1 class="text-2xl font-bold">仓库管理</h1>
        <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">管理仓库白名单</p>
    </div>

    <!-- 仓库列表（通过 HTMX 加载） -->
    <div id="repo-list-container" hx-get="/webui/repos/list-fragment" hx-trigger="load" hx-swap="innerHTML">
        <div class="text-center py-8 text-gray-400">
            <svg class="w-8 h-8 mx-auto animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            <p class="mt-2">加载中...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
{{ super() }}
<script>
var loadRepoPage = function(n) { loadListPage('repo-list-container', '/webui/repos/list-fragment', n); };
initFilterForm('repo-filter-form', 'repo-list-container', '/webui/repos/list-fragment');

// 触发索引（文档或代码）
function triggerIndex(repoId, indexType, csrfToken) {
    var btn = document.getElementById('index-' + indexType + '-btn-' + repoId);
    if (!btn || btn.disabled) return;

    btn.disabled = true;
    btn.dataset.originalText = btn.textContent;
    btn.textContent = '索引中...';

    fetch('/webui/repos/' + repoId + '/index-' + indexType, {
        method: 'POST',
        headers: { 'X-CSRF-Token': csrfToken }
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (!data.success) {
            btn.disabled = false;
            btn.textContent = btn.dataset.originalText;
            window.dispatchEvent(new CustomEvent('show-toast', { detail: { message: data.message, type: 'error' } }));
        } else {
            window.dispatchEvent(new CustomEvent('show-toast', { detail: { message: data.message, type: 'success' } }));
        }
    })
    .catch(function() {
        btn.disabled = false;
        btn.textContent = btn.dataset.originalText;
        window.dispatchEvent(new CustomEvent('show-toast', { detail: { message: '请求失败', type: 'error' } }));
    });
}

// SSE: 文档索引完成
window.addEventListener('sse:index-docs', function(e) {
    var detail = e.detail;
    var msg = detail.success && detail.result
        ? '文档索引完成: ' + detail.repo_name + ' (' + (detail.result.total_files || 0) + ' 文件, ' + (detail.result.total_chunks || 0) + ' 块)'
        : '文档索引失败: ' + detail.repo_name + ' - ' + (detail.error || '未知错误');
    window.dispatchEvent(new CustomEvent('show-toast', {
        detail: { message: msg, type: detail.success ? 'success' : 'error' }
    }));
    // 刷新列表以恢复按钮状态
    loadListPage('repo-list-container', '/webui/repos/list-fragment', 1);
});

// SSE: 代码索引完成
window.addEventListener('sse:index-code', function(e) {
    var detail = e.detail;
    var msg = detail.success && detail.result
        ? '代码索引完成: ' + detail.repo_name + ' (' + (detail.result.indexed || 0) + ' 文件, ' + (detail.result.total_chunks || 0) + ' 块)'
        : '代码索引失败: ' + detail.repo_name + ' - ' + (detail.error || '未知错误');
    window.dispatchEvent(new CustomEvent('show-toast', {
        detail: { message: msg, type: detail.success ? 'success' : 'error' }
    }));
    loadListPage('repo-list-container', '/webui/repos/list-fragment', 1);
});
</script>
{% endblock %}
