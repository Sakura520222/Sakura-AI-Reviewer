{% extends "base.html" %}
{% block title %}{{ status_code }} - {{ title }}{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="text-center max-w-md">
        <div class="text-8xl font-bold text-gray-200 dark:text-gray-700 mb-4">{{ status_code }}</div>
        <h1 class="text-2xl font-semibold text-gray-800 dark:text-gray-200 mb-2">{{ title }}</h1>
        <p class="text-gray-500 dark:text-gray-400 mb-6">{{ message }}</p>
        <a href="/webui/" class="inline-flex items-center px-4 py-2 bg-pink-500 hover:bg-pink-600 text-white rounded-lg transition-colors">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            返回仪表盘
        </a>
    </div>
</div>
{% endblock %}
