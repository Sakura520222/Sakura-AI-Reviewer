<!DOCTYPE html>
<html lang="{{ user_prefs.language if user_prefs else 'zh-CN' }}" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sakura AI Reviewer{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('toastManager', () => ({
            toasts: [],
            _nextId: 1,
            show(message, type = 'success', duration = 4000) {
                const id = this._nextId++;
                const icons = {
                    success: '<svg class="w-5 h-5 text-green-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
                    error: '<svg class="w-5 h-5 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
                    warning: '<svg class="w-5 h-5 text-yellow-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>',
                    info: '<svg class="w-5 h-5 text-blue-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
                };
                const borders = {
                    success: 'border-l-4 border-l-green-500',
                    error: 'border-l-4 border-l-red-500',
                    warning: 'border-l-4 border-l-yellow-500',
                    info: 'border-l-4 border-l-blue-500',
                };
                const toast = {
                    id, message, type,
                    icon: icons[type] || icons.info,
                    borderClass: borders[type] || borders.info,
                    visible: false,
                };
                this.toasts.push(toast);
                this.$nextTick(() => { toast.visible = true; });
                if (duration > 0) {
                    setTimeout(() => this.dismiss(id), duration);
                }
            },
            dismiss(id) {
                const t = this.toasts.find(t => t.id === id);
                if (t) {
                    t.visible = false;
                    setTimeout(() => {
                        this.toasts = this.toasts.filter(t => t.id !== id);
                    }, 250);
                }
            },
        }));

        Alpine.data('confirmDialog', () => ({
            active: false,
            title: '确认操作',
            message: '确定要执行此操作吗？',
            warning: '',
            confirmText: '确认',
            loading: false,
            _callback: null,
            ask(options) {
                this.title = options.title || '确认操作';
                this.message = options.message || '确定要执行此操作吗？';
                this.warning = options.warning || '';
                this.confirmText = options.confirmText || '确认';
                this.loading = false;
                this.active = true;
                this._callback = options.onConfirm || null;
                return new Promise((resolve) => { this._resolver = resolve; });
            },
            confirm() {
                if (this.loading) return;
                if (this._callback) {
                    this.loading = true;
                    Promise.resolve(this._callback())
                        .then(() => { this.active = false; this._resolver?.(true); })
                        .catch(() => { this.loading = false; });
                } else {
                    this.active = false;
                    this._resolver?.(true);
                }
            },
            cancel() {
                if (this.loading) return;
                this.active = false;
                this._resolver?.(false);
            },
        }));
    });
    </script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        [x-cloak] { display: none !important; }
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen"
      x-data="{ theme: localStorage.getItem('theme') || 'light' }"
      x-init="$watch('theme', val => {
          document.documentElement.classList.toggle('dark', val === 'dark');
          localStorage.setItem('theme', val);
          fetch('/webui/auth/api/theme', {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRF-Token': '{{ csrf_token }}' },
              body: 'theme=' + val
          }).catch(() => {});
      }); document.documentElement.classList.toggle('dark', theme === 'dark');">

    <!-- Toast 通知容器 -->
    <div x-data="toastManager()"
         x-init="window.addEventListener('show-toast', (e) => show(e.detail.message, e.detail.type, e.detail.duration))"
         class="fixed top-4 right-4 z-[100] space-y-2 pointer-events-none" aria-live="polite">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-show="toast.visible"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-x-8"
                 x-transition:enter-end="opacity-100 translate-x-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-x-0"
                 x-transition:leave-end="opacity-0 translate-x-8"
                 :class="toast.borderClass"
                 class="pointer-events-auto max-w-sm w-full rounded-lg shadow-lg border bg-white dark:bg-gray-800 text-sm flex items-start gap-3 p-4">
                <div x-html="toast.icon"></div>
                <p class="flex-1 text-gray-800 dark:text-gray-200" x-text="toast.message"></p>
                <button @click="dismiss(toast.id)" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </template>
    </div>

    <!-- 确认弹窗 -->
    <div x-data="confirmDialog()"
         x-show="active" x-cloak
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-[110] flex items-center justify-center"
         @keydown.escape.window="cancel()">
        <div x-show="active" class="absolute inset-0 bg-black/50"
             @click="cancel()"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"></div>
        <div x-show="active"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100 scale-100"
             x-transition:leave-end="opacity-0 scale-95"
             class="relative bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-200 dark:border-gray-700 max-w-md w-full mx-4 p-6">
            <div class="flex items-center justify-center w-12 h-12 mx-auto mb-4 rounded-full bg-red-100 dark:bg-red-900/30">
                <svg class="w-6 h-6 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                </svg>
            </div>
            <h3 class="text-lg font-semibold text-center text-gray-900 dark:text-gray-100" x-text="title"></h3>
            <p class="mt-2 text-sm text-center text-gray-500 dark:text-gray-400" x-text="message"></p>
            <p x-show="warning" x-text="warning" class="mt-3 text-xs text-center text-red-600 dark:text-red-400 font-medium"></p>
            <div class="mt-6 flex gap-3 justify-center">
                <button @click="cancel()"
                        class="px-4 py-2 rounded-lg text-sm font-medium border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors">
                    取消
                </button>
                <button @click="confirm()"
                        :disabled="loading"
                        :class="loading ? 'opacity-50 cursor-not-allowed' : 'hover:bg-red-600'"
                        class="px-4 py-2 rounded-lg text-sm font-medium bg-red-500 text-white transition-colors">
                    <span x-show="!loading" x-text="confirmText"></span>
                    <span x-show="loading" class="flex items-center gap-2">
                        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                        处理中...
                    </span>
                </button>
            </div>
        </div>
    </div>

    <!-- 导航栏 -->
    {% include "components/navbar.html" %}

    <!-- 主内容区域 -->
    <div class="flex">
        <!-- 侧边栏 -->
        {% include "components/sidebar.html" %}

        <!-- 页面内容 -->
        <main class="flex-1 ml-0 lg:ml-64 p-6 min-h-[calc(100vh-4rem)]">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block extra_scripts %}
    <script>
    /* === Toast: query-param 桥接 & 兼容旧 flash 消息 === */
    document.addEventListener('DOMContentLoaded', function() {
        var params = new URLSearchParams(window.location.search);

        // 新格式: _toast + _toast_type
        var toastMsg = params.get('_toast');
        var toastType = params.get('_toast_type') || 'success';
        if (toastMsg) {
            window.dispatchEvent(new CustomEvent('show-toast', {
                detail: { message: decodeURIComponent(toastMsg), type: toastType }
            }));
            params.delete('_toast');
            params.delete('_toast_type');
        }

        // 兼容旧格式: saved / error
        if (!toastMsg && params.has('saved')) {
            window.dispatchEvent(new CustomEvent('show-toast', { detail: { message: '操作成功', type: 'success' } }));
            params.delete('saved');
        }
        if (!toastMsg) {
            var error = params.get('error');
            if (error) {
                var messages = {
                    'already_exists': '仓库已存在于白名单中',
                    'invalid_format': '仓库名称格式不正确，请使用 owner/repo 格式',
                    'validation': '参数验证失败，请检查输入值',
                    'save_failed': '保存失败，请稍后重试',
                    'invalid_config': '配置验证失败，请检查输入内容',
                    'permission_denied': '文件权限不足',
                    '1': '操作失败，请重试',
                };
                window.dispatchEvent(new CustomEvent('show-toast', {
                    detail: { message: messages[error] || '操作失败，请重试', type: 'error' }
                }));
                params.delete('error');
            }
        }

        // 清理 URL
        if (params.has('saved') || params.has('error') || params.has('_toast')) {
            var remaining = params.toString();
            var cleanUrl = window.location.pathname + (remaining ? '?' + remaining : '');
            history.replaceState(null, '', cleanUrl);
        }
    });

    /* === HTMX 错误处理 === */
    document.body.addEventListener('htmx:responseError', function(e) {
        var xhr = e.detail.xhr;
        var msg = '请求失败，请稍后重试';
        if (xhr) {
            if (xhr.status === 401 || xhr.status === 403) msg = '权限不足或登录已过期';
            else if (xhr.status === 422) msg = '请求数据格式错误';
            else if (xhr.status >= 500) msg = '服务器错误，请稍后重试';
        }
        window.dispatchEvent(new CustomEvent('show-toast', { detail: { message: msg, type: 'error', duration: 8000 } }));
    });

    /* === data-confirm 表单拦截 === */
    document.addEventListener('submit', function(e) {
        var form = e.target.closest('[data-confirm]');
        if (form && form._confirmed !== true) {
            e.preventDefault();
            // 获取确认弹窗实例
            var dialogEl = document.querySelector('[x-data="confirmDialog()"]');
            if (!dialogEl || !dialogEl.__x) return;
            dialogEl.__x.$data.ask({
                message: form.dataset.confirm || '确定要执行此操作吗？',
                warning: form.dataset.confirmWarning || '',
                confirmText: form.dataset.confirmText || '确认',
            }).then(function(confirmed) {
                if (confirmed) {
                    form._confirmed = true;
                    form.submit();
                }
            });
        }
    });

    /* === 按钮 Loading 状态 === */
    document.addEventListener('submit', function(e) {
        var form = e.target;
        if (form.method && form.method.toUpperCase() === 'POST') {
            var btn = form.querySelector('[type="submit"]');
            if (btn && !btn.dataset.noLoading) {
                btn._originalHTML = btn.innerHTML;
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                var text = btn.dataset.loadingText || '处理中...';
                btn.innerHTML = '<svg class="w-4 h-4 animate-spin inline-block mr-1" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>' + text;
            }
        }
    });

    // bfcache 回退时恢复按钮
    window.addEventListener('pageshow', function(e) {
        if (e.persisted) {
            document.querySelectorAll('[type="submit"]').forEach(function(btn) {
                if (btn._originalHTML) {
                    btn.innerHTML = btn._originalHTML;
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            });
        }
    });

    /* === 通用列表分页 & 过滤 === */

    function getLoadingHTML() {
        return '<div class="text-center py-8 text-gray-400"><svg class="w-8 h-8 mx-auto animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg><p class="mt-2">加载中...</p></div>';
    }

    function getErrorHTML(msg) {
        return '<div class="p-12 text-center text-red-600 dark:text-red-400"><svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><p class="mt-4">' + (msg || '加载失败，请稍后重试') + '</p></div>';
    }

    function loadListPage(containerId, endpoint, pageNum) {
        var container = document.getElementById(containerId);
        var params = new URLSearchParams(window.location.search);
        params.set('page', pageNum);
        container.innerHTML = getLoadingHTML();

        fetch(endpoint + '?' + params.toString(), {
            headers: { 'HX-Request': 'true' }
        })
        .then(function(r) { return r.text(); })
        .then(function(html) {
            container.innerHTML = html;
            history.replaceState(null, '', '?' + params.toString());
        })
        .catch(function(err) {
            console.error('加载失败:', err);
            container.innerHTML = getErrorHTML();
        });
    }

    function initFilterForm(formId, containerId, endpoint) {
        document.addEventListener('submit', function(e) {
            if (e.target.id === formId) {
                e.preventDefault();
                var formData = new FormData(e.target);
                var params = new URLSearchParams();
                for (var pair of formData.entries()) {
                    if (pair[1]) params.set(pair[0], pair[1]);
                }
                params.set('page', '1');

                var container = document.getElementById(containerId);
                container.innerHTML = getLoadingHTML();

                fetch(endpoint + '?' + params.toString(), {
                    headers: { 'HX-Request': 'true' }
                })
                .then(function(r) { return r.text(); })
                .then(function(html) {
                    container.innerHTML = html;
                    history.replaceState(null, '', '?' + params.toString());
                })
                .catch(function(err) {
                    console.error('加载失败:', err);
                    container.innerHTML = getErrorHTML();
                });
            }
        });
    }
    </script>
    {% endblock %}
</body>
</html>
